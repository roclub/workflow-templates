name: Add Release to Notion

on:
  workflow_call:
    inputs:
      change_name:
        description: "Name of the change (prefixed to the version in the Notion Change field)"
        required: true
        type: string
      version:
        description: "Release version / tag name"
        required: true
        type: string
      release_url:
        description: "URL of the GitHub release"
        required: true
        type: string
      release_type:
        description: "Type of release: major, minor, or patch"
        required: true
        type: string

jobs:
  notion_release_entry:
    runs-on: ubuntu-latest
    steps:
      - name: Create Notion entry
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ "${{ inputs.release_type }}" = "patch" ]; then
            TEMPLATE_ID="31b805481db08081a918d9abac7a8eb1"
          else
            TEMPLATE_ID="2a9805481db0806fa5f5ee6333c8f5af"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{
              "parent": { "database_id": "'"$NOTION_DATABASE_ID"'" },
              "template": { "type": "template_id", "template_id": "'"$TEMPLATE_ID"'" },
              "properties": {
                "Change": {
                  "title": [
                    {
                      "text": {
                        "content": "${{ inputs.change_name }} ${{ inputs.version }}"
                      }
                    }
                  ]
                },
                "Version": {
                  "rich_text": [
                    {
                      "text": {
                        "content": "${{ inputs.version }}"
                      }
                    }
                  ]
                },
                "Release Link": {
                  "url": "${{ inputs.release_url }}"
                },
                "Status": {
                  "select": {
                    "name": "Ready for QA"
                  }
                },
                "Type of testing": {
                  "multi_select": [
                    { "name": "Internal Testing" }
                  ]
                }
              }
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            exit 1
          fi
