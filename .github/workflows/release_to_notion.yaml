name: Add Release to Notion

on:
  workflow_call:
    inputs:
      change_name:
        description: "Name of the change (prefixed to the version in the Notion Change field)"
        required: true
        type: string
      version:
        description: "Release version / tag name"
        required: true
        type: string
      release_url:
        description: "URL of the GitHub release"
        required: true
        type: string

jobs:
  notion_release_entry:
    runs-on: ubuntu-latest
    steps:
      - name: Create Notion entry
        run: |
          curl -s -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{
              "parent": { "database_id": "${{ secrets.NOTION_DATABASE_ID }}" },
              "properties": {
                "Change": {
                  "title": [
                    {
                      "text": {
                        "content": "${{ inputs.change_name }} ${{ inputs.version }}"
                      }
                    }
                  ]
                },
                "Version": {
                  "rich_text": [
                    {
                      "text": {
                        "content": "${{ inputs.version }}"
                      }
                    }
                  ]
                },
                "Release Link": {
                  "url": "${{ inputs.release_url }}"
                },
                "Status": {
                  "select": {
                    "name": "Ready for QA"
                  }
                }
              }
            }'
